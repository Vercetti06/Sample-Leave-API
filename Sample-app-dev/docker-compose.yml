version: "3.9"

services:

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/leavedb
    depends_on:
      - db
    networks:
      - leave-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leavedb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - leave-network

volumes:
  postgres-data:

networks:
  leave-network:
    driver: bridge
